kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.2
  name: keycloakidentityproviders.keycloak.hostzero.com
spec:
  group: keycloak.hostzero.com
  names:
    categories:
    - keycloak
    - all
    kind: KeycloakIdentityProvider
    listKind: KeycloakIdentityProviderList
    plural: keycloakidentityproviders
    shortNames:
    - kcidp
    singular: keycloakidentityprovider
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: Whether the identity provider is ready
      jsonPath: .status.ready
