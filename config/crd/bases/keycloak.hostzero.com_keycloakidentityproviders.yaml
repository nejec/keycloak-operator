                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              instance:
                description: Instance contains the resolved instance reference
                properties:
                  clusterInstanceRef:
                    description: ClusterInstanceRef is the name of the cluster instance
                    type: string
                  instanceRef:
                    description: InstanceRef is the name of the namespaced instance
                    type: string
                type: object
              message:
                description: Message contains additional information
                type: string
              ready:
                description: Ready indicates if the identity provider is ready
                type: boolean
              realm:
                description: Realm contains the resolved realm reference
                properties:
                  clusterRealmRef:
                    description: ClusterRealmRef is the name of the cluster realm
                    type: string
                  realmRef:
                    description: RealmRef is the name of the namespaced realm
                    type: string
                type: object
              resourcePath:
                description: ResourcePath is the Keycloak API path for this identity
                  provider
                type: string
              status:
                description: Status is a human-readable status message
                type: string
              tokenExchange:
                description: |-
                  TokenExchange contains the observed state of the token-exchange
                  permission wiring, populated only when spec.tokenExchange is set.
                properties:
                  enabled:
                    description: |-
                      Enabled reflects whether fine-grained authz permissions are enabled on
                      this IdP in Keycloak.
                    type: boolean
                  message:
                    description: |-
                      Message carries the last token-exchange reconcile error, if any. Set
                      only when token-exchange reconcile fails — the parent `status.ready`
                      still reflects the IdP itself, not the TE side.
                    type: string
                  permissionID:
                    description: |-
                      PermissionID is the ID of the `token-exchange` scope permission auto-
                      created in the realm-management authz resource server when permissions
                      are enabled on this IdP.
                    type: string
                  policyID:
                    description: |-
                      PolicyID is the ID of the Client-type authz policy managed by the
                      operator (carries the AllowedClients list).
                    type: string
                  policyName:
                    description: |-
                      PolicyName is the name of the managed policy, useful for admins
                      looking the resource up in the Keycloak UI.
                    type: string
                type: object
